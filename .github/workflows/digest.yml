name: Daily discovery digest

on:
  schedule:
    - cron: '0 14 * * *'   # 14:00 UTC daily; adjust to your preferred time
  workflow_dispatch:       # manual trigger via Actions tab or gh workflow run
    inputs:
      dry_run:
        description: 'Dry run (print to logs, do not post to Slack)'
        required: false
        default: 'false'

permissions:
  contents: write          # to persist dedup state via commit-back

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run digest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'openai/gpt-4o-mini' }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: ${{ vars.SLACK_CHANNEL || 'discovery-feed' }}
          PICKS_PER_DIGEST: ${{ vars.PICKS_PER_DIGEST || '5' }}
          ENABLE_REDDIT: 'true'
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi

      - name: Commit dedup state
        if: github.event.inputs.dry_run != 'true'
        run: |
          if [ -f data/seen.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/seen.json
            git diff --cached --quiet || git commit -m "chore: update dedup state [skip ci]"
            git push || true
          fi
